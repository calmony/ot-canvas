  --color-text-tertiary: #888780;
  --color-border-tertiary: rgba(0,0,0,0.08);

@media (prefers-color-scheme: dark) {

* { box-sizing: border-box; margin: 0; padding: 0; }

.sidebar-logo { padding: 18px 16px 12px; border-bottom: 0.5px solid var(--color-border-tertiary); }
.logo-text { font-size: 14px; font-weight: 500; letter-spacing: 0.04em; }

.topbar-left { display: flex; align-items: center; gap: 10px; }
.page-title { font-size: 15px; font-weight: 500; }
.badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 500; }
.badge-info { background: #E6F1FB; color: #185FA5; }
.badge-warn { background: #FAEEDA; color: #854F0B; }
.badge-danger { background: #FCEBEB; color: #A32D2D; }
.badge-success { background: #EAF3DE; color: #3B6D11; }
.topbar-right { display: flex; align-items: center; gap: 8px; }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; font-size: 13px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: transparent; color: var(--color-text-primary); cursor: pointer; font-family: var(--font-sans); }
.btn:hover { background: var(--color-background-secondary); }
.btn-primary { background: #185FA5; color: #fff; border-color: #185FA5; }
.btn-primary:hover { background: #0C447C; }
.btn i { font-size: 15px; }
.content { flex: 1; overflow-y: auto; padding: 16px 20px; }
.metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 16px; }
.metric-card { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 12px 14px; }
.metric-label { font-size: 11px; color: var(--color-text-tertiary); font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; display: flex; align-items: center; gap: 5px; }
.metric-val { font-size: 22px; font-weight: 500; }
.metric-sub { font-size: 11px; color: var(--color-text-secondary); margin-top: 3px; }
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 12px; }

.card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 14px 16px; }
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.card-title { font-size: 13px; font-weight: 500; }
.card-action { font-size: 12px; color: #185FA5; cursor: pointer; background: none; border: none; font-family: var(--font-sans); }
.purdue-zone { border-radius: var(--border-radius-md); padding: 8px 10px; margin-bottom: 6px; display: flex; align-items: center; justify-content: space-between; }

.zone-l4 { background: #E6F1FB; color: #0C447C; }
.zone-l35 { background: #EAF3DE; color: #27500A; }
.zone-l2 { background: #FAEEDA; color: #633806; }
.zone-l1 { background: #FAECE7; color: #712B13; }
.zone-l0 { background: #FCEBEB; color: #791F1F; }
.asset-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.asset-table th { font-size: 11px; color: var(--color-text-tertiary); font-weight: 500; text-align: left; padding: 6px 8px; border-bottom: 0.5px solid var(--color-border-tertiary); white-space: nowrap; }

.status-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 5px; }
.dot-online { background: #639922; }
.dot-offline { background: #E24B4A; }

.level-name { font-size: 12px; font-weight: 500; }

function sendPrompt(t) { alert('Demo action: "' + t + '"\n\nIn the production version, this would generate a change request, POA&M entry, or migration plan via the AI backend.'); }

function showView(v) {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const map = { dashboard:0, alerts:1, inventory:2, purdue:3, network:4, firmware:5, eol:6, vuln:7, import:8, reports:9, settings:10 };
  const items = document.querySelectorAll('.nav-item');
  if (map[v] !== undefined && items[map[v]]) items[map[v]].classList.add('active');
  const titles = { dashboard:'Dashboard', alerts:'Alerts', inventory:'Asset Inventory', purdue:'Purdue Model', network:'Network Map', firmware:'Firmware Manager', eol:'EOL Tracker', vuln:'Vulnerabilities', import:'Import / Scan', reports:'Reports', settings:'Settings' };
  document.getElementById('page-title').textContent = titles[v] || v;
  const ctx = { dashboard:'Site: PLANT-01', alerts:`${ALERTS.length} Active`, inventory:`${ASSETS.length} assets`, purdue:'Levels 0–4', firmware:`${ASSETS.length} devices`, eol:'Multiple expiring', vuln:`${ASSETS.reduce((s,a)=>s+a.cves,0)} CVEs`, import:'Nmap · CSV · XLSX', reports:'Auto-generated', settings:'Admin' };
  document.getElementById('page-ctx').textContent = ctx[v] || '';
  renderView(v);
}

function renderView(v) {
  const el = document.getElementById('main-content');
  if (v === 'dashboard') el.innerHTML = dashboardHTML();
  else if (v === 'inventory') el.innerHTML = inventoryHTML();
  else if (v === 'purdue') el.innerHTML = purdueHTML();
  else if (v === 'firmware') el.innerHTML = firmwareHTML();
  else if (v === 'eol') el.innerHTML = eolHTML();
  else if (v === 'alerts') el.innerHTML = alertsHTML();
  else if (v === 'import') el.innerHTML = importHTML();
  else if (v === 'vuln') el.innerHTML = vulnHTML();
  else el.innerHTML = `<div style="color:var(--color-text-secondary);font-size:13px;padding:20px;">View coming soon. This is a UI prototype — the ${v} view would render here in production.</div>`;
}

function eolColor(dateStr) {
  const d = new Date(dateStr + '-01'), now = new Date(), months = (d - now) / (1000*60*60*24*30);
  if (months < 6) return ['#E24B4A', 'danger'];
  if (months < 18) return ['#EF9F27', 'warn'];
  return ['#639922', 'ok'];
}

function dashboardHTML() {
  const online = ASSETS.filter(a => a.status === 'online').length;

  <div class="metric-card"><div class="metric-label"><i class="ti ti-circle-check" style="font-size:13px"></i> Online</div><div class="metric-val" style="color:#639922">${online}</div><div class="metric-sub">${warn} degraded</div></div>
  <div class="metric-card"><div class="metric-label"><i class="ti ti-shield-off" style="font-size:13px"></i> Open CVEs</div><div class="metric-val" style="color:#E24B4A">${totalCVEs}</div><div class="metric-sub">Across ${ASSETS.filter(a=>a.cves>0).length} assets</div></div>
  <div class="metric-card"><div class="metric-label"><i class="ti ti-calendar-x" style="font-size:13px"></i> EOL Critical</div><div class="metric-val" style="color:#E24B4A">${eolSoon}</div><div class="metric-sub">Within 6 months</div></div>
  <div class="metric-card"><div class="metric-label"><i class="ti ti-cpu" style="font-size:13px"></i> Firmware OOD</div><div class="metric-val" style="color:#EF9F27">${fwOld}</div><div class="metric-sub">Updates available</div></div>
</div>
<div class="two-col">
  <div class="card">
    <div class="card-header"><span class="card-title">Purdue Distribution</span><button class="card-action" onclick="showView('purdue')">View model →</button></div>
    <div class="purdue-visual">${byLevel.map(({l,count}) => `<div class="purdue-level ${levelColors[l]}" onclick="showView('purdue')"><div class="level-info"><span class="level-num">L${l === 35 ? '3.5' : l}</span><span class="level-name">${levelNames[l]}</span></div><span class="level-badge">${count} assets</span></div>`).join('')}</div>
  </div>
  <div class="card">
    <div class="card-header"><span class="card-title">Active Alerts</span><button class="card-action" onclick="showView('alerts')">All alerts →</button></div>
    ${recentAlerts.map(a => `<div class="alert-item"><div class="alert-icon ai-${a.sev}"><i class="${a.icon}" style="font-size:13px"></i></div><div style="flex:1;min-width:0"><div style="font-weight:500;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${a.title}</div><div style="color:var(--color-text-secondary);font-size:11px;margin-top:1px">${a.detail.substring(0,60)}${a.detail.length>60?'…':''}</div></div><div style="font-size:10px;color:var(--color-text-tertiary);white-space:nowrap;margin-left:8px">${a.time}</div></div>`).join('')}
  </div>
</div>
<div class="three-col">
  <div class="card">
    <div class="card-header"><span class="card-title">CVEs by Asset</span><button class="card-action" onclick="showView('vuln')">All vulns →</button></div>
    ${topCVE.map(a => `<div class="progress-row"><span class="progress-label" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:90px;font-size:11px" title="${a.name}">${a.name.split('-').slice(0,3).join('-')}</span><div class="progress-track"><div class="progress-fill" style="width:${Math.min(100, a.cves*16)}%;background:${a.cves >= 4 ? '#E24B4A' : a.cves >= 2 ? '#EF9F27' : '#639922'}"></div></div><span class="progress-val">${a.cves}</span></div>`).join('')}
  </div>

    ${[...ASSETS].sort((a,b) => new Date(a.eol+'-01') - new Date(b.eol+'-01')).slice(0,5).map(a => { const [color] = eolColor(a.eol); return `<div style="display:flex;align-items:center;justify-content:space-between;padding:4px 0;border-bottom:0.5px solid var(--color-border-tertiary);font-size:11px"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:140px;color:var(--color-text-primary)">${a.name}</span><span style="color:${color};font-weight:500;white-space:nowrap">${a.eol}</span></div>`;}).join('')}
  </div>
  <div class="card">

function inventoryHTML() {
  const cols = ['Status','Name','Type','Level','Vendor','Model','IP Address','MAC','Firmware','EOL','CVEs','Zone','Entry'];

function assetRow(a) {
  const dot = a.status === 'online' ? 'dot-online' : a.status === 'warn' ? 'dot-warn' : 'dot-offline';
  const [ecolor] = eolColor(a.eol);
  const fwMatch = a.fw === a.fw_latest || a.fw === 'N/A';
  return `<tr><td><span class="status-dot ${dot}"></span>${a.status}</td><td style="font-weight:500;white-space:nowrap">${a.name}</td><td><span class="tag">${a.type}</span></td><td style="text-align:center">L${a.level === 35 ? '3.5' : a.level}</td><td>${a.vendor}</td><td style="font-size:11px;color:var(--color-text-secondary)">${a.model}</td><td style="font-family:var(--font-mono);font-size:11px">${a.ip}</td><td style="font-family:var(--font-mono);font-size:10px">${a.mac}</td><td><span class="fw-badge ${fwMatch ? 'fw-ok' : 'fw-old'}">${a.fw}</span></td><td style="color:${ecolor};font-weight:500;font-size:11px">${a.eol}</td><td style="text-align:center">${a.cves > 0 ? `<span class="badge ${a.cves >= 4 ? 'badge-danger' : 'badge-warn'}">${a.cves}</span>` : `<span style="color:var(--color-text-tertiary)">—</span>`}</td><td style="font-size:11px;white-space:nowrap">${a.zone}</td><td><span class="tag" style="${a.manual ? 'background:#FAEEDA;color:#633806' : ''}">${a.manual ? 'Manual' : 'Imported'}</span></td></tr>`;
}

function filterTable(q) {
  document.querySelectorAll('#inv-body tr').forEach(r => { r.style.display = q === '' || r.textContent.toLowerCase().includes(q.toLowerCase()) ? '' : 'none'; });
}

}

function importHTML() {
  return `<div class="two-col"><div><div class="card" style="margin-bottom:12px"><div class="card-header"><span class="card-title"><i class="ti ti-radar" style="font-size:15px;margin-right:6px;color:#378ADD"></i>Scan Import (L2–L4)</span></div><div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:10px">Supported for Control, Supervisory, DMZ, and Enterprise zones. Upload scan exports to auto-populate asset records.</div><div class="import-zone" onclick="sendPrompt('Browse for scan file')"><i class="ti ti-file-upload"></i><div style="font-weight:500;margin-bottom:4px">Drop scan file here or click to browse</div><div style="font-size:11px">Supports: Nmap XML · Tenable .nessus · CSV · Claroty export · Dragos export</div></div><div class="chip-group"><span class="chip sel">Nmap XML</span><span class="chip">Tenable .nessus</span><span class="chip">Claroty</span><span class="chip">Dragos</span><span class="chip">Generic CSV</span><span class="chip">XLSX</span></div></div><div class="card"><div class="card-header"><span class="card-title"><i class="ti ti-database-import" style="font-size:15px;margin-right:6px;color:#378ADD"></i>CSV / XLSX Template Import</span></div><div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:10px">Download the asset template, fill in data, and re-upload for bulk import of any level.</div><button class="btn" style="margin-right:6px" onclick="sendPrompt('Download CSV template')"><i class="ti ti-download"></i> Download Template ↗</button><button class="btn btn-primary"><i class="ti ti-upload"></i> Upload Completed Template</button></div></div><div><div class="card" style="margin-bottom:12px"><div class="card-header"><span class="card-title"><i class="ti ti-pencil" style="font-size:15px;margin-right:6px;color:#EF9F27"></i>Manual Entry (L0–L1 Required)</span></div><div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:12px">Field devices and process equipment at Levels 0–1 cannot be scanned safely. Enter assets manually.</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">${['Asset Name','Vendor','Model / Part No.','Firmware Version','IP Address','MAC Address','Serial Number','Purdue Level','Installation Date','EOL Date','Zone / Area','Location'].map(f => `<div><div style="font-size:11px;color:var(--color-text-tertiary);margin-bottom:3px">${f}</div><input placeholder="${f}" style="width:100%;font-size:12px;padding:5px 8px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-secondary);color:var(--color-text-primary);font-family:var(--font-sans)" /></div>`).join('')}</div><div style="margin-top:10px;display:flex;gap:8px"><button class="btn btn-primary" onclick="alert('Asset saved! (demo)')"><i class="ti ti-check"></i> Save Asset</button><button class="btn" onclick="sendPrompt('Show field guidance')">Field guidance ↗</button></div></div><div class="card"><div class="card-header"><span class="card-title">Recent Imports</span></div>${[{src:'Nmap XML',date:'2026-05-19',count:14,zone:'L2–L3'},{src:'Manual entry',date:'2026-05-17',count:3,zone:'L0–L1'},{src:'Claroty export',date:'2026-05-10',count:22,zone:'L2–L4'}].map(r => `<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:0.5px solid var(--color-border-tertiary);font-size:12px"><div><div style="font-weight:500">${r.src}</div><div style="font-size:11px;color:var(--color-text-secondary)">${r.zone} · ${r.date}</div></div><span class="badge badge-info">${r.count} assets</span></div>`).join('')}</div></div></div>`;
}

function vulnHTML() {
  const allCVEs = ASSETS.filter(a => a.cves > 0).sort((a,b) => b.cves - a.cves);
  return `<div class="metrics-grid" style="grid-template-columns:repeat(4,1fr)"><div class="metric-card"><div class="metric-label">Total CVEs</div><div class="metric-val" style="color:#E24B4A">${ASSETS.reduce((s,a)=>s+a.cves,0)}</div></div><div class="metric-card"><div class="metric-label">Affected Assets</div><div class="metric-val">${allCVEs.length}</div></div><div class="metric-card"><div class="metric-label">Critical (&ge;4 CVEs)</div><div class="metric-val" style="color:#E24B4A">${allCVEs.filter(a=>a.cves>=4).length}</div></div><div class="metric-card"><div class="metric-label">Clean Assets</div><div class="metric-val" style="color:#639922">${ASSETS.filter(a=>a.cves===0).length}</div></div></div><div class="card"><div class="card-header"><span class="card-title">Vulnerability Exposure</span></div><table class="asset-table"><thead><tr><th>Asset</th><th>Type</th><th>Level</th><th>Vendor</th><th>OS / Platform</th><th>Open CVEs</th><th>Firmware</th><th>EOL</th><th>Action</th></tr></thead><tbody>${allCVEs.map(a => { const [ec] = eolColor(a.eol); return `<tr><td style="font-weight:500">${a.name}</td><td><span class="tag">${a.type}</span></td><td>L${a.level===35?'3.5':a.level}</td><td>${a.vendor}</td><td style="font-size:11px;color:var(--color-text-secondary)">${a.os}</td><td><span class="badge ${a.cves>=4?'badge-danger':'badge-warn'}">${a.cves} CVEs</span></td><td><span class="fw-badge ${a.fw===a.fw_latest||a.fw==='N/A'?'fw-ok':'fw-old'}">${a.fw}</span></td><td style="color:${ec};font-size:11px;font-weight:500">${a.eol}</td><td><button class="btn" style="font-size:11px;padding:2px 8px" onclick="sendPrompt('Generate POA&M for ${a.name}')">POA&M ↗</button></td></tr>`;}).join('')}</tbody></table></div>`;
}

function filterAlerts(sev, el) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('sel'));
  el.classList.add('sel');
  document.querySelectorAll('#alert-list .alert-item').forEach(row => { row.style.display = sev === 'all' || row.dataset.sev === sev ? '' : 'none'; });
}

showView('dashboard');
</script>
